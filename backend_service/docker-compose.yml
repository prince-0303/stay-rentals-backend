version: '3.9'

services:

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    restart: always
    networks:
      - app-network

  chatbot:
    build: ../chatbot_service
    restart: always
    env_file:
      - ../chatbot_service/.env
    networks:
      - app-network

  web:
    build: .
    restart: always
    command: sh -c "python manage.py migrate && python manage.py collectstatic --noinput && daphne -b 0.0.0.0 -p 8000 --ping-interval 20 --ping-timeout 30 backend_service.asgi:application"
    environment:
      - DJANGO_SETTINGS_MODULE=backend_service.settings
      - PYTHONDONTWRITEBYTECODE=1
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
    env_file:
      - .env
    depends_on:
      - db
      - redis
      - chatbot
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/staticfiles
    depends_on:
      - web
      - chatbot
    networks:
      - app-network

  celery_worker:
    build: .
    restart: always
    command: celery -A backend_service worker --loglevel=info
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - db
      - redis
    networks:
      - app-network

  celery_beat:
    build: .
    restart: always
    command: celery -A backend_service beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - db
      - redis
    networks:
      - app-network

volumes:
  postgres_data:
  static_volume:


networks:
  app-network:
    driver: bridge
