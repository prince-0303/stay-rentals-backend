upstream django {
    server web:8000;
}

upstream chatbot {
    server chatbot:8001;
}

server {
    listen 80;

    # Django API
    location /api/ {
        proxy_pass http://django;
        proxy_set_header Host $http_host; # Dynamic host from Cloudflare
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Standardizing CORS headers (handled here so Django doesn't have to)
        add_header 'Access-Control-Allow-Origin' '$http_origin' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;

        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    # Chatbot service (FastAPI)
    location /chatbot/ {
        proxy_pass http://chatbot/; # Trailing slash strips /chatbot/ for FastAPI
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Messaging WebSockets
    location /ws/ {
        proxy_pass http://django;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    location /static/ {
        alias /app/staticfiles/;
    }

    location /health/ {
        return 200 'ok';
    }
}